# Global theme parameters

[homepage]
    # Set to true to enable 2-column grid layout
    grid = true

[footer]
    since = 2026
    launchDate = "2026-04-27"

[widgets]
    # homepage = [
    #     { type = "search" },
    #     { type = "archives", params = { limit = 5 } },
    #     { type = "categories", params = { limit = 10 } },
    #     { type = "tag-cloud", params = { limit = 10 } },
    # ]
    page = [{ type = "toc" }]

[colorScheme]
    toggle  = true
    default = "auto"

[comments]
    enabled  = true
    provider = "giscus"

    [comments.giscus]
        repo             = "ZYFsir/ZYFsir.github.io"
        repoID           = "R_kgDOSNeClg"
        category         = "Announcements"
        categoryID       = "DIC_kwDOSNeCls4C8Gqv"
        mapping          = "pathname"
        strict           = 0
        reactionsEnabled = 1
        emitMetadata     = 0
        inputPosition    = "top"
        lightTheme       = "light"
        darkTheme        = "dark_dimmed"
        lang             = "zh-CN"
        loading          = "lazy"