# 内容所在的子目录，将显示在首页和归档页
mainSections = ["post"]
# 在 RSS 中输出全文
rssFullContent = true
favicon        = "img/favicon.jpg"

# 排序方式: "default", "lastmod"
SortBy              = "default"

[footer]
    customText = "一起找点有趣的事做做吧"

[dateFormat]
    # 使用当地日期格式
    published   = ":date_medium"
    lastUpdated = ":date_medium"

[sidebar]
    emoji    = "🚀"
    subtitle = "写点东西"
    avatar   = "img/avatar.jpg"

[article]
    headingAnchor = true
    math          = true
    readingTime   = true

    [article.license]
        enabled = true
        default = "采用 CC BY-NC-SA 4.0 许可协议"
